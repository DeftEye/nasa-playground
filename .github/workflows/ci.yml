# NASA Sky Tracker — CI (VAL-CI-001/002/003).
#
# Runs on every push and pull_request targeting `master`. Steps mirror the
# commands declared in `{missionDir}/services.yaml`:
#   install (root + web), typecheck (root + web), lint:check (root + web,
#   non-mutating — no --fix in CI), backend tests against a Postgres service
#   container (creates nasa_sky_tracker + nasa_sky_tracker_test, honors
#   maxWorkers:1 from package.json), frontend tests (vitest run), backend
#   build, frontend build, and a docker build.
#
# No real secrets are referenced. JWT_SECRET / POSTGRES_* use throwaway,
# non-secret test values. The backend-test step has a single automatic retry
# to absorb a known intermittent auth test flake (see AGENTS.md "Known
# Pre-Existing Issues"); a consistently-red run still fails the job.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    # Postgres service container for the backend-test step. On Linux hosted
    # runners (no job-level `container:`) services are reachable at localhost.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          # `pass123` is the non-secret dev/test password already committed in
          # docker-compose.yml and .env.example. src/prod-shutdown.spec.ts
          # spawns the compiled `dist/main` with POSTGRES_PASSWORD hardcoded to
          # `pass123`, so the CI service MUST use the same value or that spec
          # fails with "password authentication failed for user postgres".
          POSTGRES_PASSWORD: pass123
          POSTGRES_DB: nasa_sky_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nasa_sky_tracker"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    # Connection env for the test DB creation step and backend tests. JWT_SECRET
    # is a non-secret throwaway; the test suite reads it via test/setup/env.ts.
    # POSTGRES_PASSWORD matches the service container (pass123) so both the main
    # Jest suite (nasa_sky_tracker_test) and the prod-shutdown spec's spawned
    # dist/main (hardcoded pass123) authenticate successfully.
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      # The postgres service auto-creates `nasa_sky_tracker` (POSTGRES_DB).
      # The Jest suite connects to `nasa_sky_tracker_test` (test/setup/env.ts
      # sets POSTGRES_DB = POSTGRES_DB_TEST ?? 'nasa_sky_tracker_test'), so we
      # also create that DB here. `pg` is already a root dependency.
      - name: Create nasa_sky_tracker_test database
        run: |
          node -e "const{Client}=require('pg');const c=new Client({host:'localhost',port:5432,user:'postgres',password:'pass123',database:'nasa_sky_tracker'});c.connect().then(()=>c.query('CREATE DATABASE nasa_sky_tracker_test')).then(()=>{console.log('created nasa_sky_tracker_test');return c.end()}).catch(e=>{console.log('nasa_sky_tracker_test note:',e.message);process.exit(0)})"

      - name: Typecheck root
        run: npm run typecheck

      - name: Typecheck web
        run: cd web && npm run typecheck

      # Non-mutating lint (no --fix). Root `lint:check` mirrors web `lint:check`.
      - name: Lint check root
        run: npm run lint:check

      - name: Lint check web
        run: cd web && npm run lint:check

      # Build the backend BEFORE tests: src/prod-shutdown.spec.ts (VAL-HARD-002)
      # spawns the compiled `dist/main` and sends SIGTERM, so `dist/main.js` must
      # exist when the Jest suite runs. (Locally `dist/` already exists from
      # prior builds; in a fresh CI checkout it does not.)
      - name: Backend build
        run: npm run build

      # Backend tests against the postgres service container. NODE_ENV=test is
      # honored by test/setup/env.ts; maxWorkers:1 is set in package.json jest
      # config (serial — the shared test DB would TRUNCATE across parallel
      # workers). A single automatic retry absorbs the known intermittent auth
      # flake (AGENTS.md "Known Pre-Existing Issues"); a genuine failure fails
      # the retry too, so the job still goes red.
      - name: Backend tests
        id: backend_tests
        continue-on-error: true
        env:
          NODE_ENV: test
        run: npm test

      - name: Backend tests (retry on known flake)
        if: steps.backend_tests.outcome == 'failure'
        env:
          NODE_ENV: test
        run: npm test

      - name: Frontend tests
        run: cd web && npm run test -- --run

      - name: Frontend build
        run: cd web && npm run build

      - name: Docker build
        run: docker build -t nasa-sky-tracker:ci .

  # Continuous deployment: CI-gated (needs ci), push-to-master-only. Triggers
  # the Render deploy hook, then verifies the live /api/nasa/health endpoint
  # returns 200 before the job is considered green. Never runs on pull_request.
  deploy:
    name: Deploy to Render
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      # POST to the Render deploy hook. The URL is a repository secret and is
      # passed via env (never inlined). `-f` makes curl fail on non-2xx.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      # Known limitation: with only a deploy hook (no Render API key/service
      # ID) we can confirm the service is healthy after the deploy, but cannot
      # strictly assert the newly-pushed commit is the version now live. The
      # initial 45s sleep lets Render begin replacing the old instance so we
      # don't just read a 200 from the still-running previous version.
      - name: Wait for deploy to go live
        run: |
          echo "Waiting 45s for Render to start replacing the old instance..."
          sleep 45
          url="https://nasa-playground.onrender.com/api/nasa/health"
          for attempt in $(seq 1 40); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$url" || true)
            echo "Attempt ${attempt}/40: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "Deploy is live and healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Health endpoint did not return 200 within the budget."
          exit 1
