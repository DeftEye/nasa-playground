services:
  db:
    image: postgres:17
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: nasa_sky_tracker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nasa_sky_tracker']
      interval: 5s
      timeout: 3s
      retries: 5
